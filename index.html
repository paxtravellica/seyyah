<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <title>Seyyah - Tarihi Rotalar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 20px; }
        #map { height: 600px; width: 100%; max-width: 1000px; margin: 0 auto; border-radius: 10px; border: 2px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .info-box { max-width: 1000px; margin: 0 auto 20px auto; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        h2 { margin-top: 0; color: #2c3e50; }
        p { color: #555; margin-bottom: 0; }
    </style>
</head>
<body>
    
    <div class="info-box">
        <h2>Roger Bodenham'ın Akdeniz Seyahati (1550-1551)</h2>
        <p>Gizli veri yöntemiyle haritaya gömülmüş tarihi rotalar.</p>
    </div>
    
    <div id="map"></div>

    <script>
        // Haritayı başlatıyoruz
        var map = L.map('map').setView([40, 10], 4);

        // Tarihi harita dokusuna uygun altlık (Esri NatGeo)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; National Geographic'
        }).addTo(map);

        // Roger Bodenham'ın rotasını barındıran gizli verimiz
        var seyyahYolu = [
            { isim: "Roger Bodenham", sehir: "Gravesend", yil: 1550, koordinat: [51.44214015, 0.370893611] },
            { isim: "Roger Bodenham", sehir: "Tilbury", yil: 1551, koordinat: [51.46391064, 0.358384251] },
            { isim: "Roger Bodenham", sehir: "Plymouth", yil: 1551, koordinat: [50.37573651, -4.142889711] },
            { isim: "Roger Bodenham", sehir: "Cape Finisterre", yil: 1551, koordinat: [42.90314177, -9.270402346] },
            { isim: "Roger Bodenham", sehir: "Cádiz", yil: 1551, koordinat: [36.52142185, -6.280407214] },
            { isim: "Roger Bodenham", sehir: "Cebelitarık Boğazı", yil: 1551, koordinat: [36.14109306, -5.353768747] },
            { isim: "Roger Bodenham", sehir: "Mayorka", yil: 1551, koordinat: [39.69584077, 3.017485432] },
            { isim: "Roger Bodenham", sehir: "Sardunya", yil: 1551, koordinat: [40.14179118, 9.011542767] },
            { isim: "Roger Bodenham", sehir: "Messina", yil: 1551, koordinat: [38.19413642, 15.55421673] },
            { isim: "Roger Bodenham", sehir: "Santorini", yil: 1551, koordinat: [36.4, 25.4] },
            { isim: "Roger Bodenham", sehir: "Mikonos", yil: 1551, koordinat: [37.44732564, 25.36642409] },
            { isim: "Roger Bodenham", sehir: "Sakız", yil: 1551, koordinat: [38.3683234, 26.13100103] },
            { isim: "Roger Bodenham", sehir: "Messina", yil: 1551, koordinat: [38.19413642, 15.55421673] },
            { isim: "Roger Bodenham", sehir: "Londra", yil: 1551, koordinat: [51.50834616, -0.128377824] }
        ];

        // Koordinatları sadece çizgi çizmek için ayırıyoruz
        var cizgiNoktalari = seyyahYolu.map(s => s.koordinat);

        // Çizgiyi haritaya ekle (Kırmızı renkli rota)
        var polyline = L.polyline(cizgiNoktalari, {color: '#c0392b', weight: 4, opacity: 0.8}).addTo(map);

        // Harita açıldığında rotayı tam ekrana sığdıracak sihirli kod
        map.fitBounds(polyline.getBounds());

        // Her bir şehre küçük bir nokta/marker koy ve bilgileri ekle
        seyyahYolu.forEach(function(durak) {
            L.circleMarker(durak.koordinat, {radius: 6, color: '#2c3e50', fillColor: '#fff', fillOpacity: 1})
                .addTo(map)
                .bindPopup("<b>" + durak.sehir + "</b><br>" + durak.isim + " (" + durak.yil + ")");
        });
    </script>
</body>
</html>
